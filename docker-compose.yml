services:
  v2-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.v2-bot
    env_file:
      - v2/.env
    ports:
      - "8787:8787"
    restart: unless-stopped
    volumes:
      - ./v2/logs:/app/v2/logs

  v3-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.v3-bot
    env_file:
      - v3/.env
    ports:
      - "8788:8788"
    restart: unless-stopped
    volumes:
      - ./v3/logs:/app/v3/logs

  v4-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.v4-bot
    env_file:
      - v4/.env
    ports:
      - "8789:8789"
    restart: unless-stopped
    volumes:
      - ./v4/logs:/app/v4/logs

  v5-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.v5-bot
    env_file:
      - v5/.env
    ports:
      - "8790:8790"
    restart: unless-stopped
    volumes:
      - ./v5/logs:/app/v5/logs

  control-plane:
    build:
      context: .
      dockerfile: docker/Dockerfile.control-plane
    env_file:
      - packages/control-plane/.env
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./v2:/app/v2
      - ./v3:/app/v3
      - ./v4:/app/v4
      - ./v5:/app/v5
    environment:
      - CONTROL_MODE=docker
      - REPO_ROOT=/app
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "3000:3000"
    depends_on:
      - control-plane
    restart: unless-stopped
